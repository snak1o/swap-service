# CI/CD: GitHub → Docker Hub → RunPod
#
# Workflow:
# 1. Push to `main` branch → build Docker GPU image
# 2. Push image to Docker Hub with version tag
# 3. Update RunPod Serverless Endpoint to use new image
#
# Required GitHub Secrets:
#   DOCKER_USERNAME   - Docker Hub username
#   DOCKER_PASSWORD   - Docker Hub password or access token
#   RUNPOD_API_KEY    - RunPod API key
#   RUNPOD_ENDPOINT_ID - RunPod Serverless endpoint ID

name: Deploy to RunPod

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger

env:
  DOCKER_IMAGE: snak1o/bodyswap-gpu
  DOCKERFILE: Dockerfile.gpu

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # --- Checkout ---
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Docker Hub Login ---
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # --- Build & Push Docker Image ---
      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${SHORT_SHA}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push GPU image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.version }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Update RunPod Endpoint ---
      - name: Update RunPod Serverless Endpoint
        run: |
          echo "Updating RunPod endpoint to use image: ${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.version }}"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X PATCH \
            "https://api.runpod.io/v2/endpoints/${{ secrets.RUNPOD_ENDPOINT_ID }}" \
            -H "Authorization: Bearer ${{ secrets.RUNPOD_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "imageName": "${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.version }}"
            }')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Response: ${BODY}"
          echo "HTTP Code: ${HTTP_CODE}"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "❌ RunPod endpoint update failed!"
            exit 1
          fi

          echo "✅ RunPod endpoint updated successfully!"

      # --- Summary ---
      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Endpoint** | \`${{ secrets.RUNPOD_ENDPOINT_ID }}\` |" >> $GITHUB_STEP_SUMMARY
